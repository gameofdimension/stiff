repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run --no-sync ruff format
        types: [python]
        language: system
        pass_filenames: true

      - id: ruff-lint
        name: ruff lint
        entry: uv run --no-sync ruff check --fix --exclude gym/
        types: [python]
        language: system
        pass_filenames: true
